name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== SSL cert check ==="
            ls /etc/letsencrypt/live/ 2>/dev/null || echo "no letsencrypt dir"
            ls /etc/nginx/sites-available/ 2>/dev/null
            echo "=== curl localhost test ==="
            curl -s -o /dev/null -w "%{http_code}" http://localhost/ || echo "curl failed"
            echo ""
            echo "=== ufw status ==="
            ufw status 2>/dev/null || echo "ufw not available"
