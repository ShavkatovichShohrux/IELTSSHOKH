name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/ielts-app
            git fetch origin
            git reset --hard origin/main
            cp /var/www/ielts-app/deploy/nginx.conf /etc/nginx/sites-available/ielts-app
            ln -sf /etc/nginx/sites-available/ielts-app /etc/nginx/sites-enabled/ielts-app
            nginx -t
            systemctl restart ielts-app
            systemctl restart nginx
            systemctl is-active ielts-app && echo "backend: OK" || echo "backend: FAILED"
            systemctl is-active nginx && echo "nginx: OK" || echo "nginx: FAILED"
